apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "wireguard.labels" . | nindent 4 }}
spec:
  # Recreate: WireGuard holds exclusive kernel resources (wg interface,
  # Multus NetworkAttachment to host bridges, FRR daemon socket). Two
  # pods cannot co-exist on the same node, so RollingUpdate deadlocks
  # until the old pod is manually removed. Recreate terminates the old
  # pod first (brief downtime), matching compose-era --force-recreate.
  # See garuda-internal#48.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      {{- include "wireguard.selector" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wireguard.labels" . | nindent 8 }}
      annotations:
        k8s.v1.cni.cncf.io/networks: {{ include "wireguard.networks" . | quote }}
        {{- if .Values.ospf }}
        checksum/frr-config: {{ include "frr-sidecar.configmap" (dict "name" .Values.name "namespace" .Values.namespace "ospf" .Values.ospf) | sha256sum }}
        {{- end }}
    spec:
      restartPolicy: Always
      # Match the existing docker-compose stack's sysctls byte-for-byte.
      # All three are flagged "unsafe" by upstream kubelet and must be
      # allow-listed at k3s install time via
      # `--kubelet-arg=allowed-unsafe-sysctls=net.ipv4.ip_forward,net.ipv4.conf.all.src_valid_mark,net.ipv4.conf.all.rp_filter`.
      # See examples/mini-site/infra/gcp.tf for the operator-side wiring.
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      {{- $initFrr := include "frr-sidecar.initContainer" (dict
            "image" .Values.images.frr
            "ospf"  .Values.ospf
          ) -}}
      {{- if $initFrr }}
      initContainers:
        {{- $initFrr | nindent 8 }}
      {{- end }}
      containers:
        - name: wg
          # Container entrypoint is owned by the image
          # (ghcr.io/garuda-tunnel/garuda-wireguard). The image reads env vars
          # below and brings up the WireGuard interface. Variable names
          # match modules/wireguard/kube/image/entrypoint.sh so the
          # image contract is identical to the Compose stack.
          image: {{ .Values.images.wireguard | default (printf "ghcr.io/garuda-tunnel/garuda-wireguard:%s" .Chart.Version) | quote }}
          imagePullPolicy: IfNotPresent
          {{- if .Values.config.listen_port }}
          ports:
            - name: wg
              containerPort: {{ int .Values.config.listen_port }}
              hostPort: {{ int .Values.config.listen_port }}
              protocol: UDP
          {{- end }}
          envFrom:
            # The secret carries WG_PRIVATE_KEY, WG_PEER_PUBLIC_KEY and
            # the optional WG_PEER_PRESHARED_KEY.
            - secretRef:
                name: wg-{{ .Values.name }}-keys
          env:
            - name: WG_INTERFACE
              value: {{ .Values.config.kernel_ifname | quote }}
            - name: WG_ADDRESS
              value: {{ .Values.config.address | quote }}
            - name: WG_TABLE
              value: {{ .Values.table | quote }}
            - name: WG_PEER_ENDPOINT
              # Image entrypoint feeds WG_PEER_ENDPOINT verbatim into
              # the WireGuard config's `Endpoint = <host>:<port>` line.
              # The deployment template joins host and listen_port the same way
              # to form the WireGuard Endpoint value.
              value: {{ printf "%s:%d" .Values.peer.endpoint_host (int .Values.peer.endpoint_listen_port) | quote }}
            - name: WG_PEER_ALLOWED_IPS
              value: {{ join "," .Values.allowed_nets | quote }}
            - name: WG_PEER_PERSISTENT_KEEPALIVE
              value: {{ .Values.persistent_keepalive | quote }}
            {{- with .Values.config.listen_port }}
            - name: WG_LISTEN_PORT
              value: {{ . | quote }}
            {{- end }}
            - name: WG_EFFECTIVE_MTU
              value: {{ .Values.mtuPolicy.effectiveMtu | quote }}
            - name: WG_FIXED_MSS
              value: {{ .Values.mtuPolicy.fixedMss | quote }}
            - name: WG_MSS_CLAMP_ENABLED
              value: {{ .Values.mtuPolicy.mssClampEnabled | quote }}
            # WG_NIC_ATTACH advertises to the wireguard postup.sh script which
            # secondary interfaces are attached. The Compose stack mapped
            # this to docker bridge networks; the k3s deployment maps it
            # to Multus NetworkAttachmentDefinitions via the pod
            # annotation `k8s.v1.cni.cncf.io/networks`. postup.sh treats
            # `border` membership as the trigger for installing the NAT
            # postrouting rule and the via_tunnel RPDB.
            - name: WG_NIC_ATTACH
              value: {{ .Values.nic_attach | toJson | quote }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
        {{- $frr := include "frr-sidecar.container" (dict
              "image" .Values.images.frr
              "ospf" .Values.ospf
              "transit" .Values.transit
            ) -}}
        {{- if $frr }}{{ $frr | nindent 8 }}{{- end }}
      {{- if .Values.ospf }}
      volumes:
        {{- include "frr-sidecar.volume" (dict
              "name" .Values.name
              "ospf" .Values.ospf
            ) | nindent 8 }}
      {{- end }}
