namespace: garuda
name: "wireguard"
config:
  kernel_ifname: ""
  private_key: ""
  address: ""
  subnet: ""
  listen_port: null
  endpoint_host: null
peer:
  public_key: ""
  endpoint_host: ""
  endpoint_listen_port: 51820
  preshared_key: ""
  address: ""
allowed_nets: []
table: "off"
persistent_keepalive: 25
nic_attach:
  - backbone
  - border
images:
  wireguard: ""
podLabels: {}
podAnnotations: {}
# mtuPolicy: MTU and MSS clamp policy resolved by Terraform from var.mtu_policy.
# These values are always injected by the Terraform module and rendered
# unconditionally as WG_EFFECTIVE_MTU, WG_FIXED_MSS, WG_MSS_CLAMP_ENABLED env vars.
# Defaults here cover direct helm install / chart tests only.
mtuPolicy:
  effectiveMtu: 1330
  fixedMss: 1290
  mssClampEnabled: true
# ospf: accepted by schema for backward compat; inert in chart templates —
# frr-sidecar is MAP-injected (Kyverno MutatingPolicy). May be used by the
# MAP profile lookup. Removed from chart rendering in Phase 4+5.
ospf: null
