namespace: garuda
name: "wireguard"
config:
  kernel_ifname: ""
  private_key: ""
  address: ""
  subnet: ""
  listen_port: null
  endpoint_host: null
peer:
  public_key: ""
  endpoint_host: ""
  endpoint_listen_port: 51820
  preshared_key: ""
  address: ""
allowed_nets: []
table: "off"
persistent_keepalive: 25
nic_attach:
  - backbone
  - border
images:
  wireguard: ""
  frr: ""
# mtuPolicy: MTU and MSS clamp policy resolved by Terraform from var.mtu_policy.
# These values are always injected by the Terraform module and rendered
# unconditionally as WG_EFFECTIVE_MTU, WG_FIXED_MSS, WG_MSS_CLAMP_ENABLED env vars.
# Defaults here cover direct helm install / chart tests only.
mtuPolicy:
  effectiveMtu: 1330
  fixedMss: 1290
  mssClampEnabled: true
# ospf is null when omitted; FRR sidecar is then NOT rendered.
ospf: null
# transit.interfaces is the CSV ingress list for transit_watcher running
# inside the FRR sidecar. When non-empty, the deployment exports
# PBR_TRANSIT_TAG=201 (matches frr_injector/config.py:TRANSIT_TAG) and
# PBR_TRANSIT_INTERFACES — the sidecar entrypoint then launches
# transit_watcher.py automatically.
transit:
  interfaces: []
