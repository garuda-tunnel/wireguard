namespace: garuda
name: "wireguard"
config:
  kernel_ifname: ""
  private_key: ""
  address: ""
  subnet: ""
  listen_port: null
  endpoint_host: null
peer:
  public_key: ""
  endpoint_host: ""
  endpoint_listen_port: 51820
  preshared_key: ""
  address: ""
allowed_nets: []
table: "off"
persistent_keepalive: 25
nic_attach:
  - backbone
  - border
images:
  wireguard: ""
  frr: ""
# wireguard: optional interface-level tuning.
# mtu: WireGuard interface MTU passed as WG_MTU to the container.
#   null (default) lets the image use its kernel default.
#   Set to 1330 for wg-usa/wg-mexico hub side; 1370 is the wg-hub-ros hub side.
wireguard:
  mtu: null
# ospf is null when omitted; FRR sidecar is then NOT rendered.
ospf: null
# transit.interfaces is the CSV ingress list for transit_watcher running
# inside the FRR sidecar. When non-empty, the deployment exports
# PBR_TRANSIT_TAG=201 (matches frr_injector/config.py:TRANSIT_TAG) and
# PBR_TRANSIT_INTERFACES — the sidecar entrypoint then launches
# transit_watcher.py automatically.
transit:
  interfaces: []
