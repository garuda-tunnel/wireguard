# Source: wireguard/templates/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: wg-wg-pt-keys
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: wireguard
    app.kubernetes.io/instance: "wg-pt"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
type: Opaque
stringData:
  WG_PRIVATE_KEY: "stubprivatekey"
  WG_PEER_PUBLIC_KEY: "stubpublickey"

---
# Source: wireguard/templates/configmap-frr.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: "wg-pt-frr"
  namespace: "garuda"
data:
  frr.conf: |
    frr defaults traditional
    log file /tmp/frr.log
    zebra nexthop proto only
    interface wg-pt
     ip ospf area 0.0.0.0
    ip ospf hello-interval 5
     ip ospf dead-interval 15
     ip ospf mtu-ignore
    router ospf
     ospf router-id 10.130.30.1
    redistribute connected
    
     default-information originate
  daemons: |
    zebra=yes
    ospfd=yes
  vtysh.conf: |
    service integrated-vtysh-config

---
# Source: wireguard/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "wg-pt"
  namespace: "garuda"
  labels:
    app.kubernetes.io/name: wireguard
    app.kubernetes.io/instance: "wg-pt"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: garuda
    garuda.managed-by: helm
spec:
  # Recreate: WireGuard holds exclusive kernel resources (wg interface,
  # Multus NetworkAttachment to host bridges, FRR daemon socket). Two
  # pods cannot co-exist on the same node, so RollingUpdate deadlocks
  # until the old pod is manually removed. Recreate terminates the old
  # pod first (brief downtime), matching compose-era --force-recreate.
  # See garuda-internal#48.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wireguard
      app.kubernetes.io/instance: "wg-pt"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wireguard
        app.kubernetes.io/instance: "wg-pt"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/part-of: garuda
        garuda.managed-by: helm
      annotations:
        k8s.v1.cni.cncf.io/networks: "backbone@backbone,border@border"
        checksum/frr-config: 0a5f9495fd8b5ac6252d77fe92f3c68273012405b020ceb6c1cc5acd366cd6fb
    spec:
      restartPolicy: Always
      # Match the existing docker-compose stack's sysctls byte-for-byte.
      # All three are flagged "unsafe" by upstream kubelet and must be
      # allow-listed at k3s install time via
      # `--kubelet-arg=allowed-unsafe-sysctls=net.ipv4.ip_forward,net.ipv4.conf.all.src_valid_mark,net.ipv4.conf.all.rp_filter`.
      # See examples/mini-site/infra/gcp.tf for the operator-side wiring.
      securityContext:
        sysctls:
          - name: net.ipv4.ip_forward
            value: "1"
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
          - name: net.ipv4.conf.all.rp_filter
            value: "2"
      containers:
        - name: wg
          # Container entrypoint is owned by the image
          # (ghcr.io/garuda-tunnel/garuda-wireguard). The image reads env vars
          # below and brings up the WireGuard interface. Variable names
          # match modules/wireguard/kube/image/entrypoint.sh so the
          # image contract is identical to the Compose stack.
          image: "ghcr.io/garuda-tunnel/garuda-wireguard:latest"
          imagePullPolicy: IfNotPresent
          envFrom:
            # The secret carries WG_PRIVATE_KEY, WG_PEER_PUBLIC_KEY and
            # the optional WG_PEER_PRESHARED_KEY.
            - secretRef:
                name: wg-wg-pt-keys
          env:
            - name: WG_INTERFACE
              value: "wg-pt"
            - name: WG_ADDRESS
              value: "192.0.2.2/30"
            - name: WG_TABLE
              value: "off"
            - name: WG_PEER_ENDPOINT
              # Image entrypoint feeds WG_PEER_ENDPOINT verbatim into
              # the WireGuard config's `Endpoint = <host>:<port>` line.
              # The deployment template joins host and listen_port the same way
              # to form the WireGuard Endpoint value.
              value: "hub.example.net:51820"
            - name: WG_PEER_ALLOWED_IPS
              value: "0.0.0.0/0"
            - name: WG_PEER_PERSISTENT_KEEPALIVE
              value: "25"
            - name: WG_EFFECTIVE_MTU
              value: "1330"
            - name: WG_FIXED_MSS
              value: "1290"
            - name: WG_MSS_CLAMP_ENABLED
              value: "true"
            # WG_NIC_ATTACH advertises to the wireguard postup.sh script which
            # secondary interfaces are attached. The Compose stack mapped
            # this to docker bridge networks; the k3s deployment maps it
            # to Multus NetworkAttachmentDefinitions via the pod
            # annotation `k8s.v1.cni.cncf.io/networks`. postup.sh treats
            # `border` membership as the trigger for installing the NAT
            # postrouting rule and the via_tunnel RPDB.
            - name: WG_NIC_ATTACH
              value: "[\"backbone\",\"border\"]"
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
        - name: frr-sidecar
          image: "ghcr.io/garuda-tunnel/garuda-frr-sidecar:latest"
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: frr-source
              mountPath: /etc/frr-source
              readOnly: true
          securityContext:
            capabilities:
              add: ["NET_ADMIN", "NET_RAW", "SYS_ADMIN"]
      volumes:
        - name: frr-source
          configMap:
            name: wg-pt-frr
