namespace: garuda
name: wg-pt
config:
  kernel_ifname: wg-pt
  private_key: stubprivatekey
  address: 192.0.2.2/30
  subnet: 192.0.2.0/30
  listen_port: null
  endpoint_host: null
peer:
  public_key: stubpublickey
  endpoint_host: hub.example.net
  endpoint_listen_port: 51820
  preshared_key: ""
  address: 192.0.2.1/30
allowed_nets:
  - 0.0.0.0/0
table: "off"
persistent_keepalive: 25
nic_attach:
  - backbone
  - border
images:
  wireguard: ghcr.io/garuda-tunnel/garuda-wireguard:latest
mtuPolicy:
  effectiveMtu: 1330
  fixedMss: 1290
  mssClampEnabled: true
ospf: null
# podAnnotations tests the vanilla guest contract: MAP injects the Multus
# network annotation via podAnnotations; the chart renders it verbatim.
# This scenario was formerly "with-transit-provider" (frr/transit behavior
# that is now MAP-owned). Repurposed to lock podAnnotations passthrough.
podAnnotations:
  k8s.v1.cni.cncf.io/networks: "backbone@backbone,border@border"
